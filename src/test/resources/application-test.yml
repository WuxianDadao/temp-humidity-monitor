# 测试环境配置
spring:
  # TDengine配置
  datasource:
    tdengine:
      url: jdbc:TAOS://localhost:6030/iot_temp_humidity_test
      username: root
      password: taosdata
      driver-class-name: com.taosdata.jdbc.TSDBDriver
      hikari:
        connection-timeout: 30000
        maximum-pool-size: 10
        minimum-idle: 2
        idle-timeout: 600000
        max-lifetime: 1800000
  
  # PostgreSQL配置（测试环境）
  datasource:
    url: jdbc:postgresql://localhost:5432/iot_temp_humidity_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # Redis配置（测试环境）
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  
  # 应用配置
  application:
    name: iot-temp-humidity-test
  
  # 测试配置
  test:
    database:
      replace: none

# 日志配置
logging:
  level:
    com.iot.temphumidity: DEBUG
    org.springframework.jdbc.core: DEBUG
    com.taosdata.jdbc: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# TDengine测试配置
tdengine:
  test:
    enabled: true
    create-database: true
    create-stable: true
    test-data:
      count: 10
      interval-seconds: 60

# 测试数据配置
test:
  data:
    temperature:
      min: -20.0
      max: 50.0
    humidity:
      min: 0.0
      max: 100.0
    battery:
      min: 0
      max: 100