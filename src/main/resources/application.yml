server:
  port: 8080

spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    # PostgreSQL配置
    url: jdbc:postgresql://localhost:5432/iot_db
    username: iot_user
    password: iot_password_secure
    driver-class-name: org.postgresql.Driver
    
    # Hikari连接池配置
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: HikariCP-PostgreSQL
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000

# TDengine配置
tdengine:
  jdbc:
    url: jdbc:TAOS-RS://localhost:6041/iot_db
    username: root
    password: taosdata
    driver-class-name: com.taosdata.jdbc.rs.RestfulDriver
  pool:
    initial-size: 5
    max-active: 20
    min-idle: 5
    max-idle: 10
    max-wait: 30000

# MQTT配置
mqtt:
  broker-url: tcp://localhost:1883
  username: admin
  password: public
  client-id: iot-server-${random.uuid}
  default-topic: iot/sensor/data
  qos: 1
  clean-session: true
  connection-timeout: 30
  keep-alive-interval: 60

# 应用配置
app:
  name: temp-humidity-monitor
  version: 1.0.0
  description: 物联网温湿度实时监测系统
